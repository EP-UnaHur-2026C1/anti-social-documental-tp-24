services:
  database:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - ./data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
  
  usuario:
    image: mongo-express
    ports:
      - "8082:8081"
    environment:
      MONGO_INITDB_ROOT_ADMIN_USERNAME: root
      MONGO_INITDB_ROOT_ADMIN_PASSWORD: example
      ME_CONFIG_MONGODB_URL: mongodb://root:example@database:27017/
      ME_CONFIG_BASICAUTH: false

  api:
    build: .
    ports:
      - "5000:4001"
    environment:
      - PORT=4001
      - MONGO_URL=mongodb://root:example@database:27017/unahur?authSource=admin
    depends_on:
      - database